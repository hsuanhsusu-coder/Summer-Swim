 const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getFirestore(app),provider=new GoogleAuthProvider();
 const $=id=>document.getElementById(id);
 const log=(m,c)=>{ const l=$("log"); l.style.display="block"; l.innerHTML+=(c?`<span class="${c}">${m}</span>`:m)+"\n"; l.scrollTop=l.scrollHeight; };
 onAuthStateChanged(auth,u=>{
   if(!u){ $("loginBtn").style.display="inline-flex"; $("runBtn").style.display="none"; $("logoutBtn").style.display="none"; $("who").style.display="none"; return; }
   $("who").style.display="block"; $("who").textContent="已登入："+u.email;
   $("loginBtn").style.display="none"; $("logoutBtn").style.display="inline-block";
   if(u.email.toLowerCase()===ADMIN){ $("runBtn").style.display="inline-block"; }
   else { log("⚠️ 你不是最高管理員（"+ADMIN+"），無法匯入。請改用管理員帳號登入。","err"); }
 });
 $("loginBtn").onclick=async()=>{ try{ await signInWithPopup(auth,provider); }catch(e){ log("登入失敗："+(e.code||e.message),"err"); } };
 $("logoutBtn").onclick=()=>signOut(auth);
 $("runBtn").onclick=async()=>{
   $("runBtn").disabled=true;
   log("開始匯入，共 "+DATA.length+" 筆…");
   let ok=0,fail=0;
   for(const s of DATA){
     try{
       await setDoc(doc(db,"students",s.id),{
         order:s.order,cls:s.cls,seat:s.seat,name:s.name,grade:s.grade,
         parentEmail:s.parentEmail,parentEmail2:s.parentEmail2,parentNote:s.parentNote,
         unlockSummer:s.unlockSummer,unlockSemester:s.unlockSemester,active:s.active,
         responses:s.responses,comment:s.comment
       },{merge:true});
       const n=Object.keys(s.responses).length;
       log("✓ "+s.name+"（"+(s.parentEmail||"無信箱")+"）出席 "+n+" 場","ok"); ok++;
     }catch(e){ log("✗ "+s.name+" 失敗："+(e.code||e.message),"err"); fail++; }
   }
   log("");
   log("完成！成功 "+ok+" 筆"+(fail?("，失敗 "+fail+" 筆"):"")+"。",fail?"err":"ok");
   log("現在可以回到正式網頁，重新整理就會看到資料。");
 };
